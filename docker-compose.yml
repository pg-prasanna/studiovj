version: '3.8'

# ==========================================
# Studio VJ — Full Stack Docker Compose
# ==========================================
#
# Usage:
#   1. cp backend/.env.docker backend/.env
#   2. Fill in ALL required values in backend/.env
#   3. docker-compose up --build
#
# Services:
#   mysql          → internal database (not exposed in prod)
#   backend        → Spring Boot API  → http://localhost:8080
#   admin-frontend → React admin UI   → http://localhost:3001
#   viewer         → React viewer UI  → http://localhost:5173
#
# Frontend images bake the API URL at build time via --build-arg.
# Set VITE_API_URL / VITE_API_BASE_URL in backend/.env before building.
# ==========================================

services:

  # ---- MySQL --------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: studiovj_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DATABASE_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - studiovj_net

  # ---- Spring Boot Backend ------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studiovj_backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - studiovj_net

  # ---- Admin Frontend -----------------------------------------------
  # VITE_API_URL is baked into the JS bundle at build time.
  # Change it by updating backend/.env and running: docker-compose build admin-frontend
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Studio VJ Admin}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_ENABLE_DEBUG: ${VITE_ENABLE_DEBUG:-false}
        VITE_ENABLE_MOCK_DATA: ${VITE_ENABLE_MOCK_DATA:-false}
    container_name: studiovj_admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      - backend
    networks:
      - studiovj_net

  # ---- Viewer Frontend ----------------------------------------------
  viewer:
    build:
      context: ./studiovj-photograph
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Studio VJ - Photo Gallery}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_SITE_TITLE: ${VITE_SITE_TITLE:-Studio VJ Photography}
        VITE_SITE_DESCRIPTION: ${VITE_SITE_DESCRIPTION:-Professional Photography Portfolio}
        VITE_ENABLE_DEBUG: ${VITE_ENABLE_DEBUG:-false}
        VITE_ENABLE_MOCK_DATA: ${VITE_ENABLE_MOCK_DATA:-false}
    container_name: studiovj_viewer
    restart: unless-stopped
    ports:
      - "${VIEWER_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - studiovj_net

networks:
  studiovj_net:
    driver: bridge

volumes:
  mysql_data:
  backend_logs:
