version: '3.8'

# ==========================================
# Studio VJ — Docker Compose
# ==========================================
# Usage:
#   1. cp .env.docker .env
#   2. Fill in all required values in .env
#   3. docker-compose up --build
#
# For production, pass env vars via your orchestrator (Kubernetes, ECS, etc.)
# and do NOT commit .env to version control.
# ==========================================

services:
  # ---- MySQL Database -------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: studiovj_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DATABASE_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - studiovj_net

  # ---- Spring Boot Backend --------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studiovj_backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      # Database — use service name 'mysql', not localhost
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # CORS — set to your frontend URLs
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # Logging
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - studiovj_net

networks:
  studiovj_net:
    driver: bridge

volumes:
  mysql_data:
  backend_logs:
